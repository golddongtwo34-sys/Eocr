
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>전기 계산기</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
background:#0d1117;
color:#fff;
}

.page{
display:none;
padding:20px;
max-width:900px;
margin:auto;
}

.page.active{
display:block;
}

h2{
margin-top:0;
}

.card{
background:#161b22;
border-radius:14px;
padding:18px;
margin-bottom:20px;
}

select,input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:12px;
background:#111;
border:1px solid #333;
color:#fff;
border-radius:8px;
}

.result{
margin-top:10px;
line-height:1.7;
}

.bottomTabs{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
background:#111;
border-top:1px solid #333;
display:flex;
}

.bottomTabs button{
flex:1;
background:none;
border:none;
color:#aaa;
font-size:14px;
}

.bottomTabs button.active{
color:#fff;
font-weight:600;
}

.admin{
position:fixed;
top:20px;
right:20px;
font-size:22px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="admin" onclick="openAdmin()">⚙</div>

<!-- MOTOR PAGE -->
<div id="motorPage" class="page active">
<h2>모터 계산</h2>
<div class="card">
모터 계산 탭 (기존 기능 유지 자리)
</div>
</div>

<!-- BREAKER PAGE -->
<div id="breakerPage" class="page">
<h2>차단기 선정</h2>
<div class="card">
차단기 계산 탭 (기존 기능 유지 자리)
</div>
</div>

<!-- BUSBAR PAGE -->
<div id="busbarPage" class="page">
<h2>기성 Busbar</h2>

<div class="card">

<label>메인 프레임</label>
<select id="main"></select>

<label>분기 프레임</label>
<select id="branch"></select>

<label>라인</label>
<select id="line"></select>

<label>타입</label>
<select id="type"></select>

<div class="result">
<div>타공 : <span id="hole"></span></div>
<div>길이 : <span id="length"></span></div>
<div>금형 : <span id="mold"></span></div>
<div>메모 : <span id="memo"></span></div>
</div>

</div>
</div>

<!-- TABS -->
<div class="bottomTabs">
<button class="active" onclick="openTab('motorPage',this)">모터</button>
<button onclick="openTab('breakerPage',this)">차단기</button>
<button onclick="openTab('busbarPage',this)">Busbar</button>
</div>

<script>

let DB={}

function openTab(id,btn){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(id).classList.add("active")

document.querySelectorAll(".bottomTabs button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")

}

function openAdmin(){

let pw=prompt("관리자 비밀번호")

if(pw!=="thd122007"){
alert("비밀번호 오류")
return
}

alert("관리자 기능은 기존 Busbar 관리자 그대로 사용")

}

function getLineKey(obj){

if(obj["더블"]) return "더블"
if(obj["더블라인"]) return "더블라인"

if(obj["싱글"]) return "싱글"
if(obj["싱글라인"]) return "싱글라인"

return null

}

function loadMain(){

let main=document.getElementById("main")
main.innerHTML=""

Object.keys(DB).forEach(k=>{

let o=document.createElement("option")
o.value=k
o.textContent=k
main.appendChild(o)

})

loadBranch()

}

function loadBranch(){

let main=document.getElementById("main").value
let branch=document.getElementById("branch")

branch.innerHTML=""

Object.keys(DB[main]).forEach(k=>{

let o=document.createElement("option")
o.value=k
o.textContent=k
branch.appendChild(o)

})

loadLine()

}

function loadLine(){

let main=document.getElementById("main").value
let branch=document.getElementById("branch").value
let line=document.getElementById("line")

line.innerHTML=""

let obj=DB[main][branch]

let lines=Object.keys(obj)

lines.forEach(l=>{

let o=document.createElement("option")
o.value=l
o.textContent=l
line.appendChild(o)

})

loadType()

}

function loadType(){

let main=document.getElementById("main").value
let branch=document.getElementById("branch").value
let line=document.getElementById("line").value

let type=document.getElementById("type")

type.innerHTML=""

Object.keys(DB[main][branch][line]).forEach(k=>{

let o=document.createElement("option")
o.value=k
o.textContent=k
type.appendChild(o)

})

search()

}

function search(){

let main=document.getElementById("main").value
let branch=document.getElementById("branch").value
let line=document.getElementById("line").value
let type=document.getElementById("type").value

let r=DB?.[main]?.[branch]?.[line]?.[type]

if(!r){
document.getElementById("hole").innerText=""
document.getElementById("length").innerText=""
document.getElementById("mold").innerText=""
document.getElementById("memo").innerText=""
return
}

document.getElementById("hole").innerText=r["타공"]||""
document.getElementById("length").innerText=r["길이"]||""
document.getElementById("mold").innerText=r["금형"]||""
document.getElementById("memo").innerText=r["메모"]||""

}

document.getElementById("main").onchange=loadBranch
document.getElementById("branch").onchange=loadLine
document.getElementById("line").onchange=loadType
document.getElementById("type").onchange=search

fetch("busbarDB.json")
.then(r=>r.json())
.then(d=>{

DB=d
loadMain()

})

</script>

</body>
</html>
