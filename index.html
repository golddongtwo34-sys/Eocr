
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>기성 Busbar 검색</title>
<style>
body{font-family:-apple-system;background:#0d1117;color:#fff;margin:0;padding:20px}
.wrap{max-width:900px;margin:auto}
.card{background:#161b22;padding:20px;border-radius:14px}
select{width:100%;padding:12px;margin-top:6px;margin-bottom:14px;border-radius:10px;border:1px solid #333;background:#111;color:#fff}
.result{background:#111;padding:15px;border-radius:12px;margin-top:10px}
.row{margin:6px 0}
.label{opacity:.7}
h2{margin-top:0}
</style>
</head>
<body>
<div class="wrap">
<h2>기성 Busbar</h2>

<div class="card">
<label>메인 차단기</label>
<select id="main"></select>

<label>분기</label>
<select id="branch"></select>

<label>라인</label>
<select id="line">
<option value="더블라인">더블라인</option>
<option value="싱글라인">싱글라인</option>
</select>

<label>타입</label>
<select id="type"></select>

<div class="result">
<div class="row"><span class="label">타공:</span> <span id="hole"></span></div>
<div class="row"><span class="label">길이:</span> <span id="length"></span></div>
<div class="row"><span class="label">금형:</span> <span id="mold"></span></div>
<div class="row"><span class="label">메모:</span> <span id="memo"></span></div>
</div>

</div>
</div>

<script>
let DB={}

function el(i){return document.getElementById(i)}

function fill(select,list){
select.innerHTML=""
list.forEach(v=>{
let o=document.createElement("option")
o.value=v
o.textContent=v
select.appendChild(o)
})
}

function init(){
fill(el("main"),Object.keys(DB))
updateMain()
}

function updateMain(){
let m=el("main").value
fill(el("branch"),Object.keys(DB[m]||{}))
updateLine()
}

function updateLine(){
let m=el("main").value
let b=el("branch").value
let line=el("line").value

let types=[]
if(DB[m] && DB[m][b] && DB[m][b][line]){
types=Object.keys(DB[m][b][line])
}

fill(el("type"),types)
search()
}

function search(){
let m=el("main").value
let b=el("branch").value
let line=el("line").value
let t=el("type").value

let r = DB?.[m]?.[b]?.[line]?.[t] || {}

el("hole").textContent=r["타공"]||""
el("length").textContent=r["길이"]||""
el("mold").textContent=r["금형"]||""
el("memo").textContent=r["메모"]||""
}

el("main").onchange=updateMain
el("branch").onchange=updateLine
el("line").onchange=updateLine
el("type").onchange=search

fetch("busbarDB.json")
.then(r=>r.json())
.then(d=>{
DB=d
init()
})
</script>

</body>
</html>
