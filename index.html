<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NII 전기 계산기</title>
<style>
body{margin:0;background:#0d1117;color:#eee;font-family:-apple-system}
.wrap{padding:15px}
.card{background:#161b22;padding:15px;border-radius:12px;margin-bottom:15px}
select,button{width:100%;padding:12px;margin-top:8px;border-radius:8px;border:none}
button{background:#3b82f6;color:#fff}
.row{margin-top:10px}
.tabs{display:flex;gap:10px;margin-bottom:10px}
.tab{flex:1;padding:10px;background:#222;border-radius:8px;text-align:center;cursor:pointer}
.active{background:#3b82f6}
</style>
</head>
<body>
<div class="wrap">

<div class="tabs">
<div class="tab active" onclick="showMain('motor')">모터</div>
<div class="tab" onclick="showMain('breaker')">차단기</div>
<div class="tab" onclick="showMain('busbar')">Busbar</div>
</div>

<div id="motor">

<div class="tabs">
<div class="tab active" onclick="showSub('yd')">와이델타</div>
<div class="tab" onclick="showSub('dol')">직입</div>
</div>

<div id="yd">
전압
<select id="v" onchange="setKw()">
<option value="220">220~240V</option>
<option value="380">380~440V</option>
<option value="500">500~550V</option>
</select>

kW (HP)
<select id="kw" onchange="calc()"></select>

<button onclick="calc()">검색</button>

<div class="card">
<div class="row">출력: <span id="p"></span></div>
<div class="row">MCM: <span id="mcm"></span></div>
<div class="row">AC3: <span id="ac3"></span></div>
<div class="row">TOR: <span id="tor"></span></div>
<div class="row">설정: <span id="set"></span></div>
<div class="row">MCCB: <span id="mccb"></span></div>
<div class="row">AT: <span id="at"></span></div>
</div>
</div>

<div id="dol" style="display:none">
<div class="card">직입 데이터 추가 예정</div>
</div>

</div>

<div id="breaker" style="display:none"><div class="card">차단기 유지</div></div>
<div id="busbar" style="display:none"><div class="card">Busbar 유지</div></div>

</div>

<script>

const db={
"380":[
{kw:"5.5",hp:"7.5",mcm:"MC-9a",ac3:"9",tor:"MT-12",set:"9-13",mccb:"ABS33c",at:"30"},
{kw:"7.5",hp:"10",mcm:"MC-9a",ac3:"12",tor:"MT-12",set:"12-18",mccb:"ABS33c",at:"30"},
{kw:"11",hp:"15",mcm:"MC-18a",ac3:"18",tor:"MT-32",set:"18-25",mccb:"ABS53c",at:"40"},
{kw:"15",hp:"20",mcm:"MC-18a",ac3:"18",tor:"MT-32",set:"22-32",mccb:"ABS53c",at:"50"},
{kw:"18.5",hp:"25",mcm:"MC-22b",ac3:"22",tor:"MT-32",set:"28-40",mccb:"ABS63c",at:"60"},
{kw:"22",hp:"30",mcm:"MC-32a",ac3:"32",tor:"MT-63",set:"34-50",mccb:"ABS103c",at:"75"},
{kw:"30",hp:"40",mcm:"MC-32a",ac3:"30",tor:"MT-63",set:"45-65",mccb:"ABS103c",at:"100"},
{kw:"37",hp:"50",mcm:"MC-40a",ac3:"40",tor:"MT-95",set:"54-75",mccb:"ABS103c",at:"125"},
{kw:"45",hp:"60",mcm:"MC-50a",ac3:"50",tor:"MT-95",set:"70-95",mccb:"ABS103c",at:"150"},
{kw:"55",hp:"75",mcm:"MC-65a",ac3:"65",tor:"MT-95",set:"80-100",mccb:"ABS203c",at:"200"},
{kw:"75",hp:"100",mcm:"MC-85a",ac3:"85",tor:"MT-150",set:"110-150",mccb:"ABS203c",at:"250"},
{kw:"90",hp:"125",mcm:"MC-100a",ac3:"105",tor:"MT-225",set:"120-185",mccb:"ABS303c",at:"350"},
{kw:"110",hp:"150",mcm:"MC-130a",ac3:"130",tor:"MT-225",set:"160-240",mccb:"ABS403c",at:"500"},
{kw:"132",hp:"180",mcm:"MC-150a",ac3:"150",tor:"MT-225",set:"160-240",mccb:"ABS603c",at:"500"},
{kw:"160",hp:"220",mcm:"MC-185a",ac3:"185",tor:"MT-400",set:"200-330",mccb:"ABS603c",at:"600"}
]
};

function setKw(){
const list=db["380"];
const sel=document.getElementById("kw");
sel.innerHTML="";
list.forEach((d,i)=>{
let o=document.createElement("option");
o.value=i;
o.text=d.kw+" ("+d.hp+")";
sel.appendChild(o);
});
}

function calc(){
const d=db["380"][document.getElementById("kw").value];
document.getElementById("p").innerText=d.kw+"("+d.hp+")";
document.getElementById("mcm").innerText=d.mcm;
document.getElementById("ac3").innerText=d.ac3;
document.getElementById("tor").innerText=d.tor;
document.getElementById("set").innerText=d.set;
document.getElementById("mccb").innerText=d.mccb;
document.getElementById("at").innerText=d.at;
}

function showMain(t){
document.getElementById("motor").style.display=t=="motor"?"block":"none";
document.getElementById("breaker").style.display=t=="breaker"?"block":"none";
document.getElementById("busbar").style.display=t=="busbar"?"block":"none";
}

function showSub(t){
document.getElementById("yd").style.display=t=="yd"?"block":"none";
document.getElementById("dol").style.display=t=="dol"?"block":"none";
}

setKw();calc();

</script>

</body>
</html>
