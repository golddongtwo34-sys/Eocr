
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>기성 Busbar</title>
<style>
body{font-family:-apple-system;background:#0b0f14;color:#fff;padding:20px}
.wrap{max-width:900px;margin:auto}
.card{background:#121821;padding:20px;border-radius:14px}
select{width:100%;padding:12px;margin:8px 0;border-radius:10px;background:#0d1117;color:#fff;border:1px solid #333}
.result{background:#0d1117;padding:15px;border-radius:12px;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
<h2>기성 Busbar</h2>
<div class="card">

<label>메인 차단기</label>
<select id="main"></select>

<label>분기</label>
<select id="branch"></select>

<label>라인</label>
<select id="line">
<option value="더블라인">더블라인</option>
<option value="싱글라인">싱글라인</option>
</select>

<label>타입</label>
<select id="type"></select>

<div class="result">
<div>타공: <span id="hole"></span></div>
<div>길이: <span id="len"></span></div>
<div>금형: <span id="mold"></span></div>
<div>메모: <span id="memo"></span></div>
</div>

</div>
</div>

<script>
let DB={}

function fill(el,list){
el.innerHTML=""
list.forEach(v=>{
let o=document.createElement("option")
o.value=v
o.textContent=v
el.appendChild(o)
})
}

function updateMain(){
let m=main.value
fill(branch,Object.keys(DB[m]||{}))
updateLine()
}

function updateLine(){
let m=main.value
let b=branch.value
let l=line.value
let types = DB?.[m]?.[b]?.[l] ? Object.keys(DB[m][b][l]) : []
fill(type,types)
search()
}

function search(){
let m=main.value
let b=branch.value
let l=line.value
let t=type.value
let r = DB?.[m]?.[b]?.[l]?.[t] || {}
hole.textContent=r["타공"]||""
len.textContent=r["길이"]||""
mold.textContent=r["금형"]||""
memo.textContent=r["메모"]||""
}

const main=document.getElementById("main")
const branch=document.getElementById("branch")
const line=document.getElementById("line")
const type=document.getElementById("type")
const hole=document.getElementById("hole")
const len=document.getElementById("len")
const mold=document.getElementById("mold")
const memo=document.getElementById("memo")

main.onchange=updateMain
branch.onchange=updateLine
line.onchange=updateLine
type.onchange=search

fetch("busbarDB.json")
.then(r=>r.json())
.then(d=>{
DB=d
fill(main,Object.keys(DB))
updateMain()
})
</script>
</body>
</html>
