
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>기성 Busbar 검색</title>

<style>
body{
font-family:-apple-system,Arial;
background:#0f1116;
color:#eee;
padding:20px;
max-width:700px;
margin:auto;
}

h2{
margin-bottom:20px;
}

select,input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:14px;
font-size:16px;
border-radius:8px;
border:none;
background:#1c1f26;
color:#fff;
}

.card{
background:#171a21;
padding:18px;
border-radius:12px;
margin-top:20px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.result{
font-size:17px;
line-height:1.8;
}

.label{
font-size:14px;
opacity:0.7;
}

</style>
</head>

<body>

<h2>기성 Busbar</h2>

<div class="card">

<div class="label">메인 프레임</div>
<select id="main"></select>

<div class="label">분기 프레임</div>
<select id="branch"></select>

<div class="label">라인</div>
<select id="line">
<option value="더블">더블</option>
<option value="싱글">싱글</option>
<option value="접지">접지</option>
</select>

<div class="label">타입</div>
<select id="type"></select>

<div id="pBox" style="display:none">
<div class="label">P수 (접지)</div>
<input id="pValue" placeholder="P수 입력">
</div>

</div>

<div class="card result">

<div>타공 : <span id="hole"></span></div>
<div>길이 : <span id="length"></span></div>
<div>금형 : <span id="mold"></span></div>
<div>메모 : <span id="memo"></span></div>

</div>


<script>

let BUSBAR_DB={};

fetch("busbarDB.json")
.then(res=>res.json())
.then(data=>{
BUSBAR_DB=data;
initMain();
});


function initMain(){

const main=document.getElementById("main");
main.innerHTML="";

Object.keys(BUSBAR_DB).forEach(k=>{

let o=document.createElement("option");
o.value=k;
o.textContent=k;

main.appendChild(o);

});

initBranch();

}


function initBranch(){

const main=document.getElementById("main").value;
const branch=document.getElementById("branch");

branch.innerHTML="";

Object.keys(BUSBAR_DB[main]).forEach(k=>{

let o=document.createElement("option");
o.value=k;
o.textContent=k;

branch.appendChild(o);

});

updateType();

}



function updateType(){

const line=document.getElementById("line").value;
const main=document.getElementById("main").value;
const type=document.getElementById("type");
const pBox=document.getElementById("pBox");

type.innerHTML="";

if(line==="더블"){

["RN","ST"].forEach(v=>{

let o=document.createElement("option");
o.value=v;
o.textContent=v;

type.appendChild(o);

});

pBox.style.display="none";

}


if(line==="싱글"){

let list=["1","2","3"];

if(main==="400AF" || main==="600/800AF"){
list=["1","2","3","4"];
}

list.forEach(v=>{

let o=document.createElement("option");
o.value=v;
o.textContent=v;

type.appendChild(o);

});

pBox.style.display="none";

}


if(line==="접지"){

type.innerHTML="";
pBox.style.display="block";

}

searchBusbar();

}


document.getElementById("main").addEventListener("change",()=>{
initBranch();
searchBusbar();
});

document.getElementById("branch").addEventListener("change",searchBusbar);
document.getElementById("line").addEventListener("change",updateType);
document.getElementById("type").addEventListener("change",searchBusbar);


function searchBusbar(){

const main=document.getElementById("main").value;
const branch=document.getElementById("branch").value;
const line=document.getElementById("line").value;
const type=document.getElementById("type").value;

let r=BUSBAR_DB?.[main]?.[branch]?.[line]?.[type];

if(!r){

document.getElementById("hole").textContent="";
document.getElementById("length").textContent="";
document.getElementById("mold").textContent="";
document.getElementById("memo").textContent="";

return;

}

document.getElementById("hole").textContent=r["타공"]||"";
document.getElementById("length").textContent=r["길이"]||"";
document.getElementById("mold").textContent=r["금형"]||"";
document.getElementById("memo").textContent=r["메모"]||"";

}

</script>

</body>
</html>
