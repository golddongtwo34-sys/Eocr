<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NII 전기 계산기</title>
<style>
:root{
  --bg:#0b0f14; --panel:#0f1722; --card:#111c2a; --line:rgba(255,255,255,.08);
  --text:rgba(255,255,255,.92); --muted:rgba(255,255,255,.62);
  --accent:#7dd3fc; --accent2:#a78bfa; --ok:#b7ffcf; --warn:#ffd6a1;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:
    radial-gradient(1200px 900px at 18% 12%, rgba(167,139,250,.18), transparent 62%),
    radial-gradient(1100px 900px at 75% 45%, rgba(125,211,252,.14), transparent 60%),
    radial-gradient(800px 700px at 55% 5%, rgba(255,255,255,.05), transparent 60%),
    var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR","Apple SD Gothic Neo","Segoe UI",Roboto,sans-serif;
}
a{color:#7dd3fc}
.app{min-height:100vh;display:grid;grid-template-columns:288px 1fr;}
.sidebar{
  padding:16px 14px;
  background:linear-gradient(180deg, rgba(255,255,255,.04), transparent 45%), linear-gradient(180deg, rgba(15,23,34,.98), rgba(15,23,34,.86)), var(--panel);
  border-right:1px solid var(--line);
}
.brand{
  border-radius:20px;padding:18px 14px 16px;margin-bottom:16px;
  background:linear-gradient(135deg, rgba(125,211,252,.20), rgba(167,139,250,.20)), rgba(15,23,34,.94);
  border:1px solid rgba(125,211,252,.38);
  box-shadow:0 14px 40px rgba(0,0,0,.45), inset 0 0 40px rgba(125,211,252,.10);
}
.logo{
  font-weight:950;letter-spacing:.36em;font-size:28px;margin:0;
  background:linear-gradient(90deg,#7dd3fc,#a78bfa,#7dd3fc);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.sub{margin-top:8px;font-size:11px;color:var(--muted);letter-spacing:.14em}
.book{
  width:100%;margin:10px 0;padding:14px;border-radius:16px;border:1px solid var(--line);
  background:linear-gradient(135deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
  color:var(--text);cursor:pointer;text-align:left;font-weight:900;
}
.book.active{border-color:rgba(125,211,252,.60);background:linear-gradient(135deg, rgba(125,211,252,.16), rgba(167,139,250,.12))}
.book .meta{display:block;margin-top:6px;font-size:12px;color:var(--muted)}
.main{padding:22px 18px 110px}
.tab{display:none}.tab.active{display:block}
.head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:4px 0 14px}
.head h2{margin:0;font-size:20px}
.badge{font-weight:950;letter-spacing:.22em;font-size:12px;padding:8px 10px;border-radius:999px;border:1px solid rgba(125,211,252,.38);background:linear-gradient(135deg, rgba(125,211,252,.10), rgba(167,139,250,.10))}
.card{
  max-width:980px;background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
  border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 18px 55px rgba(0,0,0,.40);
}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:8px}.wide{grid-column:1/-1}
label{font-size:12px;color:var(--muted);letter-spacing:.06em}
input,select,button,textarea{
  width:100%;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,.10);
  background:rgba(10,14,20,.55);color:var(--text);outline:none;font-size:16px;
}
textarea{min-height:110px;resize:vertical}
button.calc{
  border:1px solid rgba(125,211,252,.40);
  background:linear-gradient(135deg, rgba(125,211,252,.20), rgba(167,139,250,.14));
  font-weight:950;cursor:pointer;
}
.ghost{
  flex:0 0 auto;padding:12px 14px;border-radius:14px;font-size:13px;font-weight:900;
  border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);color:rgba(255,255,255,.9);cursor:pointer;
}
.actionRow{display:flex;gap:10px;align-items:stretch}
.kv{margin-top:14px;border-top:1px solid var(--line);padding-top:14px;font-size:16px;line-height:1.65}
.small{font-size:12px;color:var(--muted);line-height:1.55;margin-top:10px}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.pill2{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.10);background:rgba(10,14,20,.35);color:var(--muted);font-size:12px}
.resultCard{
  margin-top:14px;padding:18px;border-radius:16px;
  background:linear-gradient(135deg, rgba(125,211,252,.12), rgba(167,139,250,.10));
  border:1px solid rgba(125,211,252,.35);text-align:center;
}
.resultCard .r1,.resultCard .r3{font-size:13px;color:rgba(255,255,255,.65)}
.resultCard .r2{font-size:28px;font-weight:900;margin:4px 0 10px}
.resultCard .r4{font-size:26px;font-weight:900;color:#7dd3fc}
.bottomTabs{
  display:block;position:fixed;left:0;right:0;bottom:0;z-index:9999;
  padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  background:linear-gradient(180deg, rgba(15,17,21,.55), rgba(15,17,21,.92));
  border-top:1px solid rgba(255,255,255,.10);backdrop-filter:blur(14px);
}
.bottomTabs .wrap{display:flex;gap:10px;overflow:auto}
.navBtn{
  flex:1 0 auto;padding:12px 10px;border-radius:14px;font-size:13px;font-weight:950;
  border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:rgba(255,255,255,.92);cursor:pointer;
}
.navBtn.active{
  background:linear-gradient(135deg, rgba(125,211,252,.26), rgba(167,139,250,.18));
  border-color:rgba(125,211,252,.55);
}
.modalOverlay{
  display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.55);backdrop-filter:blur(10px);
}
.modalOverlay.show{display:block}
.modal{
  position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
  width:min(720px, calc(100vw - 28px));max-height:min(80vh, 720px);overflow:auto;
  z-index:10001;border-radius:18px;background:rgba(20,22,28,.98);
  border:1px solid rgba(255,255,255,.10);box-shadow:0 18px 60px rgba(0,0,0,.55);
}
.modalHead{
  position:sticky;top:0;z-index:2;padding:14px 16px;
  background:linear-gradient(180deg, rgba(20,22,28,.98), rgba(20,22,28,.75));
  border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between;
}
.modalTitle{font-size:14px;font-weight:950}
.modalClose{
  border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);
  color:#fff;border-radius:12px;padding:10px 12px;font-weight:900;cursor:pointer;
}
.modalBody{padding:14px 16px 18px;font-size:13px;line-height:1.55;color:rgba(255,255,255,.92)}
.topRight{display:flex;align-items:center;gap:10px}
.iconBtn{
  width:42px;height:42px;border-radius:12px;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);color:#fff;font-size:20px;cursor:pointer;
}
@media (max-width:820px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .main{padding-top:6px}
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">NII</div>
      <div class="sub">NEW INTERNATIONAL INDUSTRY</div>
    </div>
    <button class="book active" onclick="openTab('tab_breaker', this)">차단기별 전선SQ<span class="meta">KIV 허용전류표</span></button>
    <button class="book" onclick="openTab('tab_motor', this)">LS 모터 보호<span class="meta">모터 보호 계산</span></button>
    <button class="book" onclick="openTab('tab_ground', this)">접지<span class="meta">접지 BUSBAR 산정</span></button>
    <button class="book" onclick="openTab('tab_breaker_calc', this)">차단기 선정<span class="meta">AT 추천</span></button>
    <button class="book" onclick="openTab('tab_busbar', this)">기성Busbar<span class="meta">검색 / DB관리</span></button>
  </aside>

  <main class="main">
    <section id="tab_breaker" class="tab active">
      <div class="head"><h2>차단기별 전선 SQ</h2><div class="badge">NII</div></div>
      <div class="card">
        <div class="grid">
          <div class="field">
            <label>단상 / 삼상 (표시용)</label>
            <select id="b_phase"><option value="1">단상</option><option value="3">삼상</option></select>
          </div>
          <div class="field">
            <label>차단기 AT (A)</label>
            <input type="number" id="b_at" placeholder="예: 100" inputmode="numeric" />
          </div>
          <div class="field wide actionRow">
            <button class="calc" onclick="calcBreakerWire()">전선 SQ 계산</button>
            <button class="ghost" onclick="showCriteria('wire')">적용기준</button>
          </div>
        </div>
        <div id="b_out" class="kv">—</div>
        <div class="small">※ 기준전류 = 0.8 × 차단기 AT (실부하 가정)</div>
      </div>
    </section>

    <section id="tab_motor" class="tab">
      <div class="head"><h2>LS 모터 보호 계산기</h2><div class="badge">NII</div></div>
      <div class="card">
        <div class="grid">
          <div class="field">
            <label>상</label>
            <select id="phase"><option value="three">삼상</option><option value="single">단상</option></select>
          </div>
          <div class="field">
            <label>단위</label>
            <select id="unit"><option value="hp">HP</option><option value="kw">kW</option></select>
          </div>
          <div class="field">
            <label>용량</label>
            <input id="val" inputmode="decimal" placeholder="예: 7.5">
          </div>
          <div class="field">
            <label>기동방식</label>
            <select id="start">
              <option value="star" selected>Y-Δ</option>
              <option value="dol">직입</option>
              <option value="inv">인버터</option>
            </select>
          </div>
          <div class="field wide actionRow">
            <button class="calc" onclick="calc()">계산</button>
            <button class="ghost" onclick="showCriteria('motor')">적용기준</button>
          </div>
        </div>
        <div id="out" class="kv"></div>
      </div>
    </section>

    <section id="tab_ground" class="tab">
      <div class="head"><h2>접지 BUSBAR 산정</h2><div class="badge">NII</div></div>
      <div class="card">
        <div class="grid">
          <div class="field">
            <label>메인 차단기 AT (A)</label>
            <input type="number" id="g_at" placeholder="예: 200" inputmode="numeric" />
          </div>
          <div class="field wide">
            <button class="calc" onclick="calcGround()">접지 BUSBAR 계산</button>
          </div>
        </div>
        <div id="g_out" class="kv">—</div>
      </div>
    </section>

    <section id="tab_breaker_calc" class="tab">
      <div class="head"><h2>차단기 선정</h2><div class="badge">NII</div></div>
      <div class="card">
        <div class="grid">
          <div class="field">
            <label>입력 방식</label>
            <select id="br_mode">
              <option value="A">전류(A)</option>
              <option value="kW">kW</option>
              <option value="HP">HP</option>
            </select>
          </div>
          <div class="field">
            <label>값 입력</label>
            <input type="number" id="br_value" placeholder="값 입력" />
          </div>
          <div class="field">
            <label>전압(V)</label>
            <select id="br_voltage"><option value="220">220</option><option value="380" selected>380</option><option value="440">440</option></select>
          </div>
          <div class="field">
            <label>부하 종류</label>
            <select id="br_load"><option value="general">일반부하</option><option value="motor">모터부하</option><option value="heater">저항부하</option></select>
          </div>
          <div class="field wide actionRow">
            <button class="calc" onclick="calcBreaker()">차단기 계산</button>
            <button class="ghost" onclick="showCriteria('breaker')">적용기준</button>
          </div>
        </div>
        <div id="br_out" class="kv">—</div>
      </div>
    </section>

    <section id="tab_busbar" class="tab">
      <div class="head">
        <h2>기성Busbar 검색</h2>
        <div class="topRight">
          <div class="badge">NII</div>
          <button class="iconBtn" onclick="openBusbarAdmin()">⚙</button>
        </div>
      </div>
      <div class="card">
        <div class="grid">
          <div class="field">
            <label>메인 차단기</label>
            <select id="bb_main"></select>
          </div>
          <div class="field">
            <label>분기 프레임</label>
            <select id="bb_branch"></select>
          </div>
          <div class="field">
            <label>라인</label>
            <select id="bb_line">
              <option value="더블라인">더블라인</option>
              <option value="싱글라인">싱글라인</option>
            </select>
          </div>
          <div class="field">
            <label>타입</label>
            <select id="bb_type"></select>
          </div>
        </div>
        <div id="bb_out" class="kv">—</div>
      </div>
    </section>
  </main>
</div>

<nav class="bottomTabs">
  <div class="wrap">
    <button class="navBtn active" onclick="openTab('tab_breaker', this)">전선SQ</button>
    <button class="navBtn" onclick="openTab('tab_motor', this)">모터보호</button>
    <button class="navBtn" onclick="openTab('tab_ground', this)">접지</button>
    <button class="navBtn" onclick="openTab('tab_breaker_calc', this)">차단기</button>
    <button class="navBtn" onclick="openTab('tab_busbar', this)">기성Busbar</button>
  </div>
</nav>

<div id="criteriaOverlay" class="modalOverlay" onclick="closeCriteria(event)"></div>
<div id="criteriaModal" class="modal" style="display:none">
  <div class="modalHead">
    <div id="criteriaTitle" class="modalTitle">적용기준</div>
    <button class="modalClose" onclick="hideCriteria()">닫기</button>
  </div>
  <div id="criteriaBody" class="modalBody"></div>
</div>

<div id="adminOverlay" class="modalOverlay" onclick="closeAdmin(event)"></div>
<div id="adminModal" class="modal" style="display:none">
  <div class="modalHead">
    <div class="modalTitle">기성Busbar DB 관리</div>
    <button class="modalClose" onclick="hideAdmin()">닫기</button>
  </div>
  <div class="modalBody">
    <div class="grid">
      <div class="field"><label>메인 차단기</label><select id="adm_main"></select></div>
      <div class="field"><label>분기 프레임</label><select id="adm_branch"></select></div>
      <div class="field">
        <label>라인</label>
        <select id="adm_line"><option value="더블라인">더블라인</option><option value="싱글라인">싱글라인</option></select>
      </div>
      <div class="field"><label>타입</label><select id="adm_type"></select></div>
      <div class="field"><label>타공</label><input id="adm_hole"></div>
      <div class="field"><label>길이</label><input id="adm_length"></div>
      <div class="field wide"><label>금형</label><input id="adm_mold"></div>
      <div class="field wide"><label>메모</label><textarea id="adm_memo"></textarea></div>
      <div class="field wide actionRow">
        <button class="calc" onclick="saveBusbarData()">저장</button>
        <button class="ghost" onclick="downloadBusbarDB()">JSON 다운로드</button>
      </div>
    </div>
  </div>
</div>

<script>
let BUSBAR_DB = {};

function openTab(id, btn){
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".book").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".navBtn").forEach(b => b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(btn) btn.classList.add("active");
}
function cableKIV_byTarget(targetA){
  const tbl=[{sq:"1.5㎟",A:18},{sq:"2.5㎟",A:24},{sq:"4㎟",A:32},{sq:"6㎟",A:41},{sq:"10㎟",A:57},{sq:"16㎟",A:76},{sq:"25㎟",A:101},{sq:"35㎟",A:125},{sq:"50㎟",A:151},{sq:"70㎟",A:192},{sq:"95㎟",A:232}];
  for(const r of tbl){ if(r.A > targetA) return r.sq; }
  return tbl[tbl.length-1].sq;
}
function calcBreakerWire(){
  const at = Number(document.getElementById("b_at").value);
  if(!isFinite(at) || at<=0){ document.getElementById("b_out").innerHTML = "값을 입력하세요."; return; }
  const target = Math.ceil(at * 0.8);
  const kiv = cableKIV_byTarget(target);
  document.getElementById("b_out").innerHTML = `<div class="resultCard"><div class="r1">기준전류</div><div class="r2">${target} A</div><div class="r3">전선(KIV)</div><div class="r4">${kiv}</div></div>`;
}
function hpToKw(hp){ return hp*0.7457; }
function eocr(I){ if(I<=22) return "GMP22-2P"; if(I<=40) return "GMP40-2P"; return "GMP60-3TZ"; }
function mc(I){
  const steps=[6,9,12,18,22,32,40,50,65,75,85,100,150,185,225];
  for(let i=0;i<steps.length;i++){
    const s=steps[i];
    if(I < s) return "MC-"+s+"b";
    if(I === s && i < steps.length-1) return "MC-"+steps[i+1]+"b";
  }
  return "대용량 MC(별도 선정)";
}
function breaker(I, phase, startMode){
  const mult={star:1.8,dol:2.2,inv:1.6}[startMode] ?? 1.8;
  const at=Math.ceil((I*mult)/5)*5;
  let af=(at<=30)?30:(at<=50)?50:(at<=100)?100:(at<=225)?225:(at<=400)?400:800;
  let code;
  if(phase==="single") code = (af===30)?"32c":(af===50)?"52c":(af===100)?"102c":(af===225)?"222c":(af===400)?"402c":"802c";
  else code = (af===30)?"33c":(af===50)?"53c":(af===100)?"103c":(af===225)?"223c":(af===400)?"403c":"803c";
  const pole=(phase==="single")?"2P":"3P";
  return {text:`ABN ${code} ${pole} ${af}AF/${at}AT`, code};
}
function cableTarget(I){ return Math.ceil(I*1.25); }
function cableKIV(I){ return cableKIV_byTarget(cableTarget(I)); }
function cableCV(I){
  const target = cableTarget(I);
  const tbl=[{sq:"1.5㎟",A:20},{sq:"2.5㎟",A:27},{sq:"4㎟",A:36},{sq:"6㎟",A:47},{sq:"10㎟",A:65},{sq:"16㎟",A:85},{sq:"25㎟",A:110},{sq:"35㎟",A:135},{sq:"50㎟",A:165},{sq:"70㎟",A:210},{sq:"95㎟",A:255}];
  for(const r of tbl){ if(r.A > target) return r.sq; }
  return tbl[tbl.length-1].sq;
}
function calc(){
  const phase = document.getElementById("phase").value;
  const unit  = document.getElementById("unit").value;
  const start = document.getElementById("start").value;
  const raw = String(document.getElementById("val").value||"").replace(",", ".");
  const x = Number(raw);
  if(!x || x<=0){ document.getElementById("out").innerHTML = "값을 입력하세요."; return; }
  const kw = (unit==="kw") ? x : hpToKw(x);
  const I = (phase==="single") ? (1000*kw)/(220*0.90*0.85) : (1000*kw)/(1.732*380*0.85*0.90);
  const eo = eocr(I), set = (I*1.10), mcx = mc(I), br = breaker(I, phase, start);
  const tgt = cableTarget(I), kiv = cableKIV(I), cv = cableCV(I);
  document.getElementById("out").innerHTML =
    `정격전류: <b>${I.toFixed(1)}A</b><br><br>
     EOCR: <b>${eo}</b><br>
     EOCR 세팅: <b>${set.toFixed(1)}A</b><br><br>
     MC: <b>${mcx}</b><br>
     차단기: <b>${br.text}</b><br><br>
     전선 기준전류: <b>${tgt}A</b><br>
     전선(KIV): <b>${kiv}</b><br>
     전선(CV): <b>${cv}</b>`;
}
function calcGround(){
  const at = Number(document.getElementById("g_at").value);
  const out = document.getElementById("g_out");
  if(!isFinite(at) || at<=0){ out.innerHTML = "값을 입력하세요."; return; }
  const Ib = Math.ceil(at * 0.8);
  const tbl=[{sq:1.5,A:18},{sq:2.5,A:24},{sq:4,A:32},{sq:6,A:41},{sq:10,A:57},{sq:16,A:76},{sq:25,A:101},{sq:35,A:125},{sq:50,A:151},{sq:70,A:192},{sq:95,A:232},{sq:120,A:269},{sq:150,A:309},{sq:185,A:353},{sq:240,A:415}];
  let S = tbl[tbl.length-1].sq;
  for(const r of tbl){ if(r.A >= Ib){ S = r.sq; break; } }
  let Spe; if(S <= 16) Spe = S; else if(S <= 35) Spe = 16; else Spe = S/2;
  const std=[6,10,16,25,35,50,70,95,120,150,185,240];
  let final=std[std.length-1];
  for(const s of std){ if(s >= Spe){ final=s; break; } }
  out.innerHTML = '접지 BUSBAR 필요 단면적<br><b style="font-size:28px">' + final + ' mm²</b>';
}
function calcBreaker(){
  const mode = document.getElementById("br_mode").value;
  const val = Number(document.getElementById("br_value").value);
  const V = Number(document.getElementById("br_voltage").value);
  const load = document.getElementById("br_load").value;
  const out = document.getElementById("br_out");
  if(!isFinite(val) || val<=0){ out.innerHTML = "값을 입력하세요."; return; }
  let pf = 0.9; if(load==="motor") pf = 0.85; if(load==="heater") pf = 1.0;
  const eta = 0.9;
  let Ib;
  if(mode==="A"){ Ib = val; }
  else{
    const kW = mode==="kW" ? val : val * 0.746;
    Ib = (kW*1000)/(Math.sqrt(3)*V*eta*pf);
  }
  const Ireq = Ib * 1.2;
  const LS_AT = [15,20,30,40,50,60,75,100,125,150,175,200,225,250,300,350,400,500,600,630,800,1000];
  let rec = LS_AT[LS_AT.length-1];
  for(const a of LS_AT){ if(a >= Ireq){ rec = a; break; } }
  out.innerHTML = '추천 차단기<br><b style="font-size:28px">'+rec+' AT</b><br><div class="small">부하전류(Ib): '+Ib.toFixed(1)+' A<br>필요 최소정격: '+Ireq.toFixed(1)+' A</div>';
}
const CRITERIA = {
  wire:{title:"전선 SQ 탭 적용기준", body:`기준전류: <b>0.8 × 차단기 AT</b><br>허용전류 ≥ 기준전류 만족하는 최소 SQ`},
  motor:{title:"모터 보호 탭 적용기준", body:`전선 기준: <b>1.25 × FLA</b><br>EOCR / MC / 차단기 추천`},
  ground:{title:"접지 BUSBAR 탭 적용기준", body:`기준전류: <b>0.8 × 차단기 AT</b><br>KEC 간이법 적용`},
  breaker:{title:"차단기 탭 적용기준", body:`필요정격 = <b>1.2 × Ib</b><br>LS 표준 AT 중 이상 최소값 선택`}
};
function showCriteria(key){
  const c = CRITERIA[key];
  document.getElementById("criteriaTitle").textContent = c.title;
  document.getElementById("criteriaBody").innerHTML = c.body;
  document.getElementById("criteriaOverlay").classList.add("show");
  document.getElementById("criteriaModal").style.display = "block";
}
function hideCriteria(){
  document.getElementById("criteriaOverlay").classList.remove("show");
  document.getElementById("criteriaModal").style.display = "none";
}
function closeCriteria(e){ if(e && e.target && e.target.id === "criteriaOverlay") hideCriteria(); }

function fillSelect(el, arr){
  el.innerHTML = "";
  (arr || []).forEach(v=>{
    const o=document.createElement("option");
    o.value=v; o.textContent=v;
    el.appendChild(o);
  });
}
function busbarTypeList(main, branch, line){
  const node = BUSBAR_DB?.[main]?.[branch]?.[line];
  return node ? Object.keys(node) : [];
}
function refreshBusbarSearch(){
  const main = document.getElementById("bb_main");
  const branch = document.getElementById("bb_branch");
  if(!main.value){ fillSelect(branch,[]); fillSelect(document.getElementById("bb_type"),[]); return; }
  fillSelect(branch, Object.keys(BUSBAR_DB[main] || {}));
  refreshBusbarTypes();
}
function refreshBusbarTypes(){
  const main = document.getElementById("bb_main").value;
  const branch = document.getElementById("bb_branch").value;
  const line = document.getElementById("bb_line").value;
  fillSelect(document.getElementById("bb_type"), busbarTypeList(main,branch,line));
  searchBusbar();
}
function searchBusbar(){
  const main = document.getElementById("bb_main").value;
  const branch = document.getElementById("bb_branch").value;
  const line = document.getElementById("bb_line").value;
  const type = document.getElementById("bb_type").value;
  const r = BUSBAR_DB?.[main]?.[branch]?.[line]?.[type];
  if(!r){ document.getElementById("bb_out").innerHTML = "—"; return; }
  document.getElementById("bb_out").innerHTML =
    `타공: <b>${r["타공"] ?? ""}</b><br>길이: <b>${r["길이"] ?? ""}</b><br>금형: <b>${r["금형"] ?? ""}</b><br>메모: <b>${r["메모"] ?? ""}</b>`;
}
function openBusbarAdmin(){
  const pw = prompt("비밀번호 입력");
  if(pw !== "Thd122007"){ alert("비밀번호 오류"); return; }
  document.getElementById("adminOverlay").classList.add("show");
  document.getElementById("adminModal").style.display = "block";
  initAdmin();
}
function hideAdmin(){
  document.getElementById("adminOverlay").classList.remove("show");
  document.getElementById("adminModal").style.display = "none";
}
function closeAdmin(e){ if(e && e.target && e.target.id === "adminOverlay") hideAdmin(); }
function initAdmin(){
  fillSelect(document.getElementById("adm_main"), Object.keys(BUSBAR_DB));
  refreshAdminBranch();
}
function refreshAdminBranch(){
  const main = document.getElementById("adm_main").value;
  fillSelect(document.getElementById("adm_branch"), Object.keys(BUSBAR_DB[main] || {}));
  refreshAdminType();
}
function refreshAdminType(){
  const main = document.getElementById("adm_main").value;
  const branch = document.getElementById("adm_branch").value;
  const line = document.getElementById("adm_line").value;
  fillSelect(document.getElementById("adm_type"), busbarTypeList(main,branch,line));
  loadAdminItem();
}
function loadAdminItem(){
  const main = document.getElementById("adm_main").value;
  const branch = document.getElementById("adm_branch").value;
  const line = document.getElementById("adm_line").value;
  const type = document.getElementById("adm_type").value;
  const r = BUSBAR_DB?.[main]?.[branch]?.[line]?.[type] || {};
  document.getElementById("adm_hole").value = r["타공"] ?? "";
  document.getElementById("adm_length").value = r["길이"] ?? "";
  document.getElementById("adm_mold").value = r["금형"] ?? "";
  document.getElementById("adm_memo").value = r["메모"] ?? "";
}
function saveBusbarData(){
  const main = document.getElementById("adm_main").value;
  const branch = document.getElementById("adm_branch").value;
  const line = document.getElementById("adm_line").value;
  const type = document.getElementById("adm_type").value;
  if(!main || !branch || !line || !type) return;
  if(!BUSBAR_DB[main]) BUSBAR_DB[main] = {};
  if(!BUSBAR_DB[main][branch]) BUSBAR_DB[main][branch] = {};
  if(!BUSBAR_DB[main][branch][line]) BUSBAR_DB[main][branch][line] = {};
  BUSBAR_DB[main][branch][line][type] = {
    "타공": document.getElementById("adm_hole").value,
    "길이": document.getElementById("adm_length").value,
    "금형": document.getElementById("adm_mold").value,
    "메모": document.getElementById("adm_memo").value
  };
  searchBusbar();
  alert("저장됨");
}
function downloadBusbarDB(){
  const blob = new Blob([JSON.stringify(BUSBAR_DB, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "busbarDB.json";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(a.href);
}

document.getElementById("bb_main").addEventListener("change", refreshBusbarSearch);
document.getElementById("bb_branch").addEventListener("change", refreshBusbarTypes);
document.getElementById("bb_line").addEventListener("change", refreshBusbarTypes);
document.getElementById("bb_type").addEventListener("change", searchBusbar);
document.getElementById("adm_main").addEventListener("change", refreshAdminBranch);
document.getElementById("adm_branch").addEventListener("change", refreshAdminType);
document.getElementById("adm_line").addEventListener("change", refreshAdminType);
document.getElementById("adm_type").addEventListener("change", loadAdminItem);

fetch("busbarDB.json")
  .then(r=>r.json())
  .then(d=>{
    BUSBAR_DB = d;
    fillSelect(document.getElementById("bb_main"), Object.keys(BUSBAR_DB));
    refreshBusbarSearch();
  })
  .catch(err=>{
    document.getElementById("bb_out").innerHTML = "busbarDB.json 로드 실패";
    console.error(err);
  });
</script>
