
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>기성 Busbar</title>

<style>
body{
font-family:-apple-system,Arial;
background:#0f1116;
color:#eee;
padding:20px;
max-width:720px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

h2{margin-bottom:20px}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#2b2f38;
color:white;
font-size:14px;
}

select,input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:14px;
font-size:16px;
border-radius:8px;
border:none;
background:#1c1f26;
color:#fff;
}

.card{
background:#171a21;
padding:18px;
border-radius:12px;
margin-top:20px;
}

.result{
font-size:17px;
line-height:1.8;
}

.label{
font-size:14px;
opacity:.7;
}

#adminPanel{
display:none;
margin-top:20px;
}

.tree{
font-family:monospace;
line-height:1.6;
}

.tree div{
padding-left:10px;
}

textarea{
width:100%;
height:250px;
background:#0b0c10;
color:#0f0;
font-family:monospace;
padding:10px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
<h2>기성 Busbar</h2>
<button onclick="openAdmin()">⚙</button>
</div>

<div class="card">

<div class="label">메인 프레임</div>
<select id="main"></select>

<div id="branchBox">
<div class="label">분기 프레임</div>
<select id="branch"></select>
</div>

<div id="lineBox">
<div class="label">라인</div>
<select id="line"></select>
</div>

<div id="typeBox">
<div class="label">타입</div>
<select id="type"></select>
</div>

<div id="pBox" style="display:none">
<div class="label">P수 (접지)</div>
<input id="pValue" placeholder="P수 입력">
</div>

</div>

<div class="card result">
<div>타공 : <span id="hole"></span></div>
<div>길이 : <span id="length"></span></div>
<div>금형 : <span id="mold"></span></div>
<div>메모 : <span id="memo"></span></div>
</div>

<div id="adminPanel" class="card">

<h3>DB 관리자</h3>

<div class="tree" id="treeView"></div>

<h4>JSON 편집</h4>
<textarea id="dbEditor"></textarea>

<button onclick="saveDB()">저장 (JSON 다운로드)</button>

</div>

<script>

let BUSBAR_DB={};

fetch("busbarDB.json")
.then(r=>r.json())
.then(d=>{
BUSBAR_DB=d;
initMain();
renderTree();
});

function initMain(){

const main=document.getElementById("main");
main.innerHTML="";

let keys=Object.keys(BUSBAR_DB);
keys.push("접지");

keys.forEach(k=>{

let o=document.createElement("option");
o.value=k;
o.textContent=k;
main.appendChild(o);

});

updateMain();

}

function updateMain(){

const main=document.getElementById("main").value;

const branchBox=document.getElementById("branchBox");
const lineBox=document.getElementById("lineBox");
const typeBox=document.getElementById("typeBox");
const pBox=document.getElementById("pBox");

if(main==="접지"){

branchBox.style.display="none";
lineBox.style.display="none";
typeBox.style.display="none";
pBox.style.display="block";

clearResult();
return;

}

branchBox.style.display="block";
lineBox.style.display="block";
typeBox.style.display="block";
pBox.style.display="none";

initBranch();

}

function initBranch(){

const main=document.getElementById("main").value;
const branch=document.getElementById("branch");

branch.innerHTML="";

Object.keys(BUSBAR_DB[main]).forEach(k=>{

let o=document.createElement("option");
o.value=k;
o.textContent=k;
branch.appendChild(o);

});

initLine();

}

function initLine(){

const line=document.getElementById("line");

line.innerHTML="";

["더블","싱글"].forEach(v=>{

let o=document.createElement("option");
o.value=v;
o.textContent=v;
line.appendChild(o);

});

updateType();

}

function updateType(){

const main=document.getElementById("main").value;
const line=document.getElementById("line").value;

const type=document.getElementById("type");
type.innerHTML="";

if(line==="더블"){

let list=["RN","ST"];

if(main==="50AF") list=["RN"];

list.forEach(v=>{

let o=document.createElement("option");
o.value=v;
o.textContent=v;
type.appendChild(o);

});

}

if(line==="싱글"){

let list=["1","2","3"];

if(main==="50AF") list=["1","2"];

if(main==="400AF" || main==="600/800AF") list=["1","2","3","4"];

list.forEach(v=>{

let o=document.createElement("option");
o.value=v;
o.textContent=v;
type.appendChild(o);

});

}

searchBusbar();

}

function searchBusbar(){

const main=document.getElementById("main").value;
const branch=document.getElementById("branch").value;
const line=document.getElementById("line").value;
const type=document.getElementById("type").value;

let r=BUSBAR_DB?.[main]?.[branch]?.[line]?.[type];

if(!r){
clearResult();
return;
}

document.getElementById("hole").textContent=r["타공"]||"";
document.getElementById("length").textContent=r["길이"]||"";
document.getElementById("mold").textContent=r["금형"]||"";
document.getElementById("memo").textContent=r["메모"]||"";

}

function clearResult(){

document.getElementById("hole").textContent="";
document.getElementById("length").textContent="";
document.getElementById("mold").textContent="";
document.getElementById("memo").textContent="";

}

document.getElementById("main").addEventListener("change",updateMain);
document.getElementById("branch").addEventListener("change",searchBusbar);
document.getElementById("line").addEventListener("change",updateType);
document.getElementById("type").addEventListener("change",searchBusbar);

function openAdmin(){

let pw=prompt("관리자 비밀번호");

if(pw==="thd122007"){

document.getElementById("adminPanel").style.display="block";

document.getElementById("dbEditor").value=JSON.stringify(BUSBAR_DB,null,2);

renderTree();

}else{

alert("비밀번호 오류");

}

}

function renderTree(){

let container=document.getElementById("treeView");

let html="";

for(let main in BUSBAR_DB){

html+="<div><b>"+main+"</b>";

for(let branch in BUSBAR_DB[main]){

html+="<div> └ "+branch+"</div>";

}

html+="</div>";

}

container.innerHTML=html;

}

function saveDB(){

if(!confirm("저장하시겠습니까?")) return;

let data=document.getElementById("dbEditor").value;

let blob=new Blob([data],{type:"application/json"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);
a.download="busbarDB.json";

a.click();

alert("JSON 다운로드 완료. GitHub에 업로드하면 적용됩니다.");

}

</script>

</body>
</html>
