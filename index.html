<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NII 전기 계산기</title>

  <style>
    :root{
      --bg:#0b0f14;
      --panel:#0f1722;
      --card:#111c2a;
      --line:rgba(255,255,255,.08);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.6);
      --accent:#7dd3fc;
      --accent2:#a78bfa;
    }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif;
    }
    .app{
      display:grid;
      grid-template-columns:240px 1fr;
      min-height:100vh;
    }
    .sidebar{
      background:var(--panel);
      padding:16px;
      border-right:1px solid var(--line);
    }
    .logo{
      font-weight:900;
      letter-spacing:.25em;
      margin-bottom:20px;
    }
    .book{
      width:100%;
      margin:8px 0;
      padding:12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#111827;
      color:#fff;
      cursor:pointer;
      text-align:left;
      font-weight:700;
    }
    .book.active{
      border-color:var(--accent);
      background:#0f1b2d;
    }
    .main{
      padding:20px;
    }
    .card{
      max-width:520px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px;
    }
    label{
      font-size:12px;
      color:var(--muted);
      display:block;
      margin-top:10px;
      margin-bottom:6px;
    }
    input,select{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid var(--line);
      background:#0b1220;
      color:#fff;
    }
    button.calc{
      width:100%;
      margin-top:14px;
      padding:12px;
      border-radius:12px;
      border:1px solid var(--accent);
      background:linear-gradient(135deg,#7dd3fc33,#a78bfa33);
      color:#fff;
      font-weight:800;
      cursor:pointer;
    }
    .result{
      margin-top:16px;
      font-size:22px;
      font-weight:900;
      text-align:right;
    }
    .tab{display:none;}
    .tab.active{display:block;}
  </style>
</head>
<body>

<div class="app">

  <div class="sidebar">
    <div class="logo">NII</div>

    <button class="book active" onclick="openTab('breaker')">
      차단기별 전선sq
    </button>
  </div>

  <div class="main">

    <div id="breaker" class="tab active">
      <h2>차단기별 전선 SQ</h2>

      <div class="card">
        <label>단상 / 삼상</label>
        <select id="phase">
          <option value="1">단상</option>
          <option value="3">삼상</option>
        </select>

        <label>차단기 AT</label>
        <input type="number" id="at" placeholder="예: 100" />

        <button class="calc" onclick="calcWire()">
          전선 SQ 계산
        </button>

        <div class="result" id="result">—</div>
      </div>
    </div>

  </div>
</div>

<script>
function openTab(id){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".book").forEach(b=>b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  event.target.classList.add("active");
}

function calcWire(){
  const at = Number(document.getElementById("at").value);
  let sq = "";

  if (at<=5) sq=0.75;
  else if (at<=7) sq=1.25;
  else if (at<=10) sq=1.5;
  else if (at<=20) sq=2.5;
  else if (at<=30) sq=4;
  else if (at<=40) sq=6;
  else if (at<=60) sq=10;
  else if (at<=75) sq=16;
  else if (at<=100) sq=25;
  else if (at<=125) sq=35;
  else if (at<=150) sq=50;
  else if (at<=175) sq=70;
  else if (at<=225) sq=95;
  else if (at<=250) sq=120;
  else sq=">120";

  document.getElementById("result").textContent =
    (sq===">120") ? "> 120 sq" : sq + " sq";
}
</script>

</body>
</html>
